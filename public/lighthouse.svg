<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background circle -->
  <circle cx="16" cy="16" r="15" fill="#F5EDD6"/>

  <!-- Structure color: ocean blue -->
  <!-- stroke shorthand -->

  <!-- LEFT LEG (outer left to base) -->
  <line x1="14" y1="8" x2="7" y2="26" stroke="#2A6F97" stroke-width="1.4" stroke-linecap="round"/>
  <!-- RIGHT LEG -->
  <line x1="18" y1="8" x2="25" y2="26" stroke="#2A6F97" stroke-width="1.4" stroke-linecap="round"/>
  <!-- INNER LEFT LEG -->
  <line x1="14.8" y1="8" x2="12" y2="26" stroke="#2A6F97" stroke-width="1.1" stroke-linecap="round"/>
  <!-- INNER RIGHT LEG -->
  <line x1="17.2" y1="8" x2="20" y2="26" stroke="#2A6F97" stroke-width="1.1" stroke-linecap="round"/>

  <!-- HORIZONTAL BRACES -->
  <line x1="8.8" y1="21" x2="23.2" y2="21" stroke="#2A6F97" stroke-width="1.1"/>
  <line x1="10.5" y1="16" x2="21.5" y2="16" stroke="#2A6F97" stroke-width="1.1"/>
  <line x1="12.3" y1="11.5" x2="19.7" y2="11.5" stroke="#2A6F97" stroke-width="1.1"/>

  <!-- DIAGONAL X-BRACING (lower panel) -->
  <line x1="8.8" y1="21" x2="12.8" y2="16" stroke="#2A6F97" stroke-width="0.9"/>
  <line x1="23.2" y1="21" x2="19.2" y2="16" stroke="#2A6F97" stroke-width="0.9"/>
  <!-- DIAGONAL X-BRACING (upper panel) -->
  <line x1="10.5" y1="16" x2="13.5" y2="11.5" stroke="#2A6F97" stroke-width="0.9"/>
  <line x1="21.5" y1="16" x2="18.5" y2="11.5" stroke="#2A6F97" stroke-width="0.9"/>

  <!-- BASE PLATFORM -->
  <line x1="6" y1="26" x2="26" y2="26" stroke="#2A6F97" stroke-width="1.5" stroke-linecap="round"/>

  <!-- LAMP ROOM body -->
  <rect x="13.5" y="4.5" width="5" height="3.5" rx="0.5" fill="#2A6F97"/>
  <!-- DOME / cap -->
  <path d="M13.2 4.5 Q16 2.5 18.8 4.5 Z" fill="#2A6F97"/>
  <!-- LANTERN GLOW -->
  <rect x="14.2" y="5" width="3.6" height="2.4" rx="0.4" fill="#F5C842" opacity="0.85"/>
</svg>
