# netlify.toml — Netlify deployment configuration for pierceinprint-website

[build]
  command = "npm run build"
  publish = "dist"

# Redirect all routes to index.html (SPA support — not strictly needed for this static site,
# but good practice in case React Router is added later)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
